  /api/v2/blocks:
    get:
      callbacks: {}
      description: |
        Retrieves a paginated list of blocks ordered by descending block number.

        When the `type` query parameter is omitted, only main-chain consensus blocks
        (equivalent to `type=block`) are returned. Use `type=uncle` to list ommer
        blocks (valid but not in the main chain) and `type=reorg` to list blocks
        that lost consensus during a chain reorganization.

        Pagination is cursor-based: the response contains `next_page_params` with
        `block_number` — pass these back as query parameters on
        the next request to fetch the following page.
      operationId: BlockScoutWeb.API.V2.BlockController.blocks
      parameters:
        - description: API key for rate limiting or for sensitive endpoints
          in: query
          name: apikey
          required: false
          schema:
            type: string
            x-struct:
            x-validate:
        - description: Secret key for getting access to restricted resources
          in: query
          name: key
          required: false
          schema:
            type: string
            x-struct:
            x-validate:
        - description: |
            Filter by block type:
            * block - Standard blocks in the main chain
            * uncle - Uncle/ommer blocks (valid but not in main chain)
            * reorg - Blocks from chain reorganizations
            If omitted, default value "block" is used.
          in: query
          name: type
          required: false
          schema:
            default: block
            enum:
              - uncle
              - reorg
              - block
            type: string
            x-struct:
            x-validate:
        - description: Number of items per page
          in: query
          name: items_count
          required: false
          schema:
            minimum: 1
            type: integer
            x-struct:
            x-validate:
        - description: Block number for paging
          in: query
          name: block_number
          required: false
          schema:
            minimum: 0
            type: integer
            x-struct:
            x-validate:
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                nullable: false
                properties:
                  items:
                    items:
                      $ref: '#/components/schemas/Block'
                    nullable: false
                    type: array
                    x-struct:
                    x-validate:
                  next_page_params:
                    example:
                      block_number: 22566361
                    nullable: true
                    type: object
                    x-struct:
                    x-validate:
                required:
                  - items
                  - next_page_params
                type: object
                x-struct:
                x-validate:
          description: List of blocks with pagination information.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonErrorResponse'
          description: Unprocessable Entity
      summary: List blocks with optional filtering by block type
      tags:
        - blocks
